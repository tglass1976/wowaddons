version: 1
intent: decide whether a feature belongs in WoW addon Lua runtime or external web tooling
rules:
  - id: runtime-no-http
    statement: WoW addon runtime should not depend on direct Blizzard OAuth web API calls
    reason: addon environment is Lua/UI focused and this repo targets in-game reliability
  - id: runtime-local-data
    statement: bank material scans and inventory UI belong in addon runtime
    reason: data exists locally in-game via WoW Lua APIs
  - id: external-auth
    statement: any feature requiring OAuth login belongs in external tooling
    reason: requires client secret handling and HTTP token exchange
  - id: external-profile
    statement: account-wide profile aggregation across regions belongs in external tooling
    reason: depends on profile endpoints and bearer tokens
  - id: external-cache
    statement: prebuilding static datasets belongs in external tooling
    reason: game data APIs are suitable for periodic fetch and local artifact generation
feature_map:
  - feature: show current bank crafting mats
    recommended_layer: addon_runtime
    implementation_hint: scan bank and reagent bank containers when bank frame is open
  - feature: account collections from Blizzard profile API
    recommended_layer: external_tool
    implementation_hint: auth code flow plus /profile/user/wow endpoints
  - feature: localized static profession metadata
    recommended_layer: external_tool_then_import
    implementation_hint: fetch game data with locale and serialize into addon-readable file
  - feature: live auction pricing overlay
    recommended_layer: hybrid
    implementation_hint: external fetcher writes cached file; addon reads cache in-game
anti_patterns:
  - putting client_secret inside addon files
  - expecting addon to execute OAuth redirect flow
  - treating web API docs as replacement for Lua API docs
decision_flow:
  - question: does this require OAuth token exchange?
    yes: external_tool
    no: continue
  - question: is all needed data available through in-game Lua APIs during play?
    yes: addon_runtime
    no: continue
  - question: can the data be precomputed offline and imported?
    yes: external_tool_then_import
    no: hybrid
